services:
    spire:
        build: .
        read_only: true
        tmpfs:
            - /tmp
        volumes:
            - spire-data:/data
        env_file: .env
        user: "1000:1000"
        ports:
            - "8080:8080"
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        pids_limit: 64
        mem_limit: 512m
        memswap_limit: 512m
        restart: unless-stopped
        logging:
            driver: none
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3

volumes:
    spire-data:
