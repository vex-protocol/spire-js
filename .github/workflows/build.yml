name: Build

on:
    pull_request:
        branches: [master]

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    checks:
        name: Lint / Types / Supply Chain
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci --ignore-scripts
            - name: ESLint
              run: npm run lint
            - name: Prettier
              run: npm run format:check
            - name: npm-package-json-lint
              run: npx npm-package-json-lint .
            - name: Type coverage
              run: npx type-coverage
            - name: License check
              run: npm run license:check
            - name: npm audit
              run: npm audit --audit-level=high
            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli@latest ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

    build-and-test:
        name: Build & Test (Docker)
        needs: checks
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Build Docker images
              run: |
                  docker build --target ci -t spire-ci .
                  docker build -t spire .
            - name: tsc
              run: docker run --rm -w /app spire-ci npx tsc
            - name: Vitest
              run: docker run --rm -w /app spire-ci npx vitest run

    # ── Single aggregator — the only required status check ────────────────

    ci-ok:
        name: CI OK
        if: always()
        needs:
            - checks
            - build-and-test
        runs-on: ubuntu-latest
        steps:
            - name: Fail if any upstream job failed, was skipped, or cancelled
              if: >-
                  ${{ contains(needs.*.result, 'failure')
                      || contains(needs.*.result, 'cancelled')
                      || contains(needs.*.result, 'skipped') }}
              run: |
                  echo "One or more CI jobs did not succeed:"
                  echo '${{ toJSON(needs) }}'
                  exit 1
            - name: All checks passed
              run: echo "All CI jobs succeeded."
